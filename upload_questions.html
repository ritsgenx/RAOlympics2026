    window.startUpload = async function() {
      const btn = document.getElementById('btn');
      const log = document.getElementById('log');
      btn.disabled = true;
      log.innerHTML = '';

      const append = (msg, cls = '') => {
        log.innerHTML += `<span class="${cls}">${msg}</span>\n`;
        log.scrollTop = log.scrollHeight;
      };

      append(`<b>Starting upload of ${QUESTIONS.length} questions…</b>`, 'info');
      let ok = 0, fail = 0;

      for (const q of QUESTIONS) {
        try {
          await setDoc(doc(db, 'quizQuestions', String(q.id)), {
            id:       q.id,
            q:        q.q,
            options:  q.options,
            correct:  q.correct,
            emoji:    q.emoji,
            category: q.category
          });
          ok++;
          if (ok % 20 === 0 || ok === QUESTIONS.length) {
            append(`✅ Uploaded ${ok}/${QUESTIONS.length}…`, 'ok');
          }
        } catch(err) {
          fail++;
          append(`❌ Error on question ${q.id}: ${err.message}`, 'err');
        }
      }

      if (fail === 0) {
        append(`\n🎉 All ${ok} questions uploaded successfully!`, 'ok');
        append(`You can now delete this file and open the main app.`, 'info');
      } else {
        append(`\n⚠️ Completed with ${fail} error(s). Re-run to retry failed questions.`, 'err');
      }
      btn.disabled = false;
    };
  </script>
